name: MVAR Integrated Witness Lane

on:
  workflow_dispatch:

jobs:
  mvar-integrated:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project and MVAR engine
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install "mvar-security>=1.4.3"

      - name: Run required Ed25519 witness test (no skip allowed)
        run: |
          pytest tests/test_witness_trust.py -k test_witness_has_real_ed25519_signature -v -rs | tee pytest_mvar_lane.log
          if grep -q "SKIPPED" pytest_mvar_lane.log; then
            echo "ERROR: mvar-integrated lane skipped required witness signature test."
            exit 1
          fi
