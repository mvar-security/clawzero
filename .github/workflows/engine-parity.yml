name: Engine Parity

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  parity:
    name: Engine parity (${{ matrix.engine-mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        engine-mode: ["mvar", "embedded"]
    env:
      CLAWZERO_ENGINE_MODE: ${{ matrix.engine-mode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify mvar-security availability
        if: matrix.engine-mode == 'mvar'
        run: |
          python - <<'PY'
          import importlib.util
          spec = importlib.util.find_spec("mvar")
          assert spec is not None, "mvar package missing in mvar parity mode"
          print("mvar package available")
          PY

      - name: Run engine parity contract suite
        run: |
          pytest -q \
            tests/runtime/test_engine_parity_contract.py \
            tests/adapters/test_filesystem_contract_generated.py \
            tests/exports/test_sarif_official_schema_contract.py
